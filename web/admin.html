<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empathy Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #1e2130;
    --border: rgba(255,255,255,0.07);
    --accent: #0A84FF;
    --green: #30d158;
    --red: #ff453a;
    --yellow: #ffd60a;
    --text: #f0f0f5;
    --muted: rgba(255,255,255,0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  /* Login */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, rgba(10,132,255,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(48,209,88,0.08) 0%, transparent 60%);
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 340px;
    text-align: center;
  }
  .login-box h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .login-box input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.15s, transform 0.15s;
  }
  .login-box button:hover { opacity: 0.9; }
  .login-box button:active { transform: scale(0.98); }
  .login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

  /* Dashboard */
  #dashboard { display: none; }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .topbar-badge {
    font-size: 11px;
    background: rgba(10,132,255,0.2);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .admin-phone { font-size: 13px; color: var(--muted); }
  .refresh-btn {
    background: rgba(255,255,255,0.07);
    border: none; color: var(--text);
    border-radius: 8px; padding: 7px 12px;
    cursor: pointer; font-size: 13px;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.12); }
  .logout-btn {
    background: rgba(255,69,58,0.15);
    border: none; color: var(--red);
    border-radius: 8px; padding: 7px 12px;
    cursor: pointer; font-size: 13px;
    transition: background 0.15s;
  }
  .logout-btn:hover { background: rgba(255,69,58,0.25); }

  .content { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-accent, var(--accent));
    border-radius: 16px 16px 0 0;
  }
  .stat-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    margin-bottom: 14px;
    background: var(--icon-bg, rgba(10,132,255,0.15));
    color: var(--card-accent, var(--accent));
  }
  .stat-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label { font-size: 13px; color: var(--muted); }
  .stat-online .stat-value { color: var(--green); }
  .stat-online { --card-accent: var(--green); --icon-bg: rgba(48,209,88,0.12); }
  .stat-users  { --card-accent: var(--accent); --icon-bg: rgba(10,132,255,0.12); }
  .stat-chats  { --card-accent: #bf5af2; --icon-bg: rgba(191,90,242,0.12); }
  .stat-msgs   { --card-accent: var(--yellow); --icon-bg: rgba(255,214,10,0.12); }
  .stat-today  { --card-accent: var(--green); --icon-bg: rgba(48,209,88,0.12); }
  .stat-msgday { --card-accent: #ff9f0a; --icon-bg: rgba(255,159,10,0.12); }

  /* Live dot */
  .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(48,209,88,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(48,209,88,0); }
  }

  /* Recent users table */
  .section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 12px;
  }
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 13px 18px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  td {
    padding: 13px 18px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge-online {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(48,209,88,0.12);
    color: var(--green);
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-offline {
    color: var(--muted);
    font-size: 13px;
  }
  .avatar-sm {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .updated-at { font-size: 12px; color: var(--muted); }

  @media (max-width: 600px) {
    .topbar { padding: 14px 16px; }
    .content { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat-value { font-size: 26px; }
    table { font-size: 12px; }
    th, td { padding: 10px 12px; }
    .topbar h1 { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:36px;margin-bottom:12px;">🛡️</div>
    <h1>Empathy Admin</h1>
    <p>Войдите с правами администратора</p>
    <input id="loginPhone" type="tel" placeholder="+7 (999) 999-99-99">
    <input id="loginPass" type="password" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Войти</button>
    <div class="login-error" id="loginError">Нет доступа или неверные данные</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo"><i class="fas fa-shield-alt"></i></div>
      <h1>Admin Panel</h1>
      <span class="topbar-badge">Empathy</span>
    </div>
    <div class="topbar-right">
      <span class="admin-phone" id="adminPhone"></span>
      <span class="updated-at" id="updatedAt"></span>
      <button class="refresh-btn" onclick="loadStats()"><i class="fas fa-sync-alt"></i> Обновить</button>
      <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>

  <div class="content">
    <div id="statsContent">
      <div class="loading"><div class="spinner"></div>Загрузка...</div>
    </div>
  </div>
</div>

<script>
let adminToken = localStorage.getItem('adminToken') || null
let adminPhone = localStorage.getItem('adminPhone') || null

async function doLogin() {
  const phone = document.getElementById('loginPhone').value.trim()
  const pass  = document.getElementById('loginPass').value
  const err   = document.getElementById('loginError')
  err.style.display = 'none'

  const res = await fetch('/auth/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({phone, password: pass})
  }).catch(() => null)

  if (!res || !res.ok) { err.style.display = 'block'; return }
  const data = await res.json()
  if (!data.token) { err.style.display = 'block'; return }

  // Verify admin access
  const check = await fetch('/admin/stats', {
    headers: {'Authorization': `Bearer ${data.token}`}
  }).catch(() => null)

  if (!check || check.status === 403) {
    err.textContent = 'Нет прав администратора'
    err.style.display = 'block'; return
  }
  if (!check.ok) { err.style.display = 'block'; return }

  adminToken = data.token
  adminPhone = data.phone
  localStorage.setItem('adminToken', adminToken)
  localStorage.setItem('adminPhone', adminPhone)
  showDashboard()
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none'
  document.getElementById('dashboard').style.display = 'block'
  document.getElementById('adminPhone').textContent = adminPhone || ''
  loadStats()
  setInterval(loadStats, 15000) // auto-refresh every 15s
}

function adminLogout() {
  localStorage.removeItem('adminToken')
  localStorage.removeItem('adminPhone')
  adminToken = null
  document.getElementById('dashboard').style.display = 'none'
  document.getElementById('loginScreen').style.display = 'flex'
}

async function loadStats() {
  const res = await fetch('/admin/stats', {
    headers: {'Authorization': `Bearer ${adminToken}`}
  }).catch(() => null)

  if (!res || res.status === 401 || res.status === 403) {
    adminLogout(); return
  }
  if (!res.ok) return
  const d = await res.json()
  renderStats(d)
}

function fmt(n) { return n?.toLocaleString('ru-RU') ?? '—' }
function timeAgo(iso) {
  if (!iso) return 'никогда'
  const diff = Date.now() - new Date(iso)
  const m = Math.floor(diff/60000)
  if (m < 1) return 'только что'
  if (m < 60) return m + ' мин. назад'
  const h = Math.floor(m/60)
  if (h < 24) return h + ' ч. назад'
  return Math.floor(h/24) + ' д. назад'
}

function renderStats(d) {
  document.getElementById('updatedAt').textContent = 'обновлено ' + new Date().toLocaleTimeString('ru-RU')

  document.getElementById('statsContent').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card stat-online">
        <div class="stat-icon"><i class="fas fa-wifi"></i></div>
        <div class="stat-value"><span class="live-dot"></span>${fmt(d.online_now)}</div>
        <div class="stat-label">Онлайн сейчас</div>
      </div>
      <div class="stat-card stat-users">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-value">${fmt(d.total_users)}</div>
        <div class="stat-label">Пользователей</div>
      </div>
      <div class="stat-card stat-chats">
        <div class="stat-icon"><i class="fas fa-comments"></i></div>
        <div class="stat-value">${fmt(d.total_chats)}</div>
        <div class="stat-label">Активных чатов</div>
      </div>
      <div class="stat-card stat-msgs">
        <div class="stat-icon"><i class="fas fa-envelope"></i></div>
        <div class="stat-value">${fmt(d.total_messages)}</div>
        <div class="stat-label">Сообщений</div>
      </div>
      <div class="stat-card stat-today">
        <div class="stat-icon"><i class="fas fa-user-plus"></i></div>
        <div class="stat-value">${fmt(d.new_today)}</div>
        <div class="stat-label">Новых сегодня</div>
      </div>
      <div class="stat-card stat-msgday">
        <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
        <div class="stat-value">${fmt(d.msgs_today)}</div>
        <div class="stat-label">Сообщений сегодня</div>
      </div>
    </div>

    <div class="section-title"><i class="fas fa-clock"></i> Последние регистрации</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Пользователь</th>
            <th>Телефон</th>
            <th>Регистрация</th>
            <th>Был онлайн</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody>
          ${d.recent_users.map(u => `
            <tr>
              <td>
                <span class="avatar-sm">${(u.name||u.username||u.phone||'?')[0].toUpperCase()}</span>
                ${u.name || u.username || '—'}
              </td>
              <td style="color:var(--muted)">${u.phone}</td>
              <td>${timeAgo(u.created_at)}</td>
              <td>${timeAgo(u.last_seen)}</td>
              <td>${u.online
                ? '<span class="badge-online"><span class="live-dot" style="width:6px;height:6px"></span>Онлайн</span>'
                : '<span class="badge-offline">Оффлайн</span>'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `
}

// Auto-login if token exists
if (adminToken) {
  showDashboard()
} 
</script>
</body>
</html>
